<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>{{ page.title }}</title>

    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, sans-serif;
      }

      nav {
	background: #f5f5f5;
	height: 60px;              /* fixed height */
	display: flex;
	align-items: center;       /* vertical centering */
	justify-content: center;   /* horizontal centering */
      }

      nav a {
        margin: 0 1rem;
        text-decoration: none;
        font-weight: 500;
        color: #333;
      }

      nav a:hover {
        text-decoration: underline;
      }

      .container > :first-child {
  	margin-top: 0;
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
        padding: 0 1.5rem;
      }

      html {
	overflow-y: scroll;
      }
    </style>
  </head>

  <body>
    <nav>
      <a href="/">Home</a>
      <a href="/about/">About</a>
    </nav>

    <div class="container">
      {{ content }}
    </div>
  </body>
</html>
